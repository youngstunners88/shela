name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    
    - name: Install Bun
      uses: oven-sh/setup-bun@v1
    
    - name: Install dependencies
      run: bun install
    
    - name: Run tests
      run: bun test
      env:
        AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
    
    - name: Run stress tests
      run: bun test --run tests/stress.test.ts
      env:
        AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}

  build-solana:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Rust
      uses: dtolnay/rust-action@stable
    
    - name: Install Solana
      run: |
        sh -c "$(curl -sSfL https://release.solana.com/v1.18.0/install)"
        export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
    
    - name: Build Treasury Program
      run: |
        cd programs/treasury
        cargo build-bpf
    
    - name: Build Reputation NFT Program
      run: |
        cd programs/reputation_nft
        cargo build-bpf
    
    - name: Build Slash Oracle Program
      run: |
        cd programs/slash_oracle
        cargo build-bpf
