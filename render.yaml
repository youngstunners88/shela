services:
  # Backend - Web Service (FastAPI)
  - type: web
    name: bhubezi-backend
    runtime: python
    plan: starter
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: bhubezi
      - key: CORS_ORIGINS
        value: https://bhubezi-frontend.onrender.com,https://bhubezi.co.za,http://localhost:5173
    healthCheckPath: /api/health

  # Frontend - Static Site
  - type: web
    name: bhubezi-frontend
    runtime: static
    buildCommand: cd app && npm install && npm run build
    staticPublishPath: ./app/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://bhubezi-backend.onrender.com/api
